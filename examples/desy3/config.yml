global:
    pixelization: healpix
    chunk_rows: 1_000_000 #default for TXPipe stages (can be overwritten in individual stages)
    chunk_size: 100_000 #default for RAIL stages (can be overwritten in individual stages)
    sparse: true
    nside: 4096


TXIngestDESY3Gold:
    name: TXIngestDESY3Gold
    input_group_name: catalog/gold/
    chunk_rows: 10_000_000

TXIngestDESY3Footprint:
    name: TXIngestDESY3Footprint
    input_nside: 4096
    input_filepaths:
        - data/desy3/inputs/patch_maps/y3a2_footprint_griz_1exp_v2.0_healsparse.hs
        - data/desy3/inputs/patch_maps/y3a2_griz_o.4096_t.32768_coverfoot_EQU_healsparse.hs
        - data/desy3/inputs/patch_maps/y3a2_foreground_mask_v2.1_healsparse.hs
        - data/desy3/inputs/patch_maps/y3a2_badregions_mask_v2.1_healsparse.hs
        - data/desy3/inputs/patch_maps/y3_gold_2.2.1_wide_sofcol_run_redmapper_v0.5.1_redmagic_highdens_vl05_vlim_zmask_ZMAX.hs
        - data/desy3/inputs/patch_maps/y3_gold_2.2.1_wide_sofcol_run_redmapper_v0.5.1_redmagic_highlum_vl10_vlim_zmask_ZMAX.hs
        - data/desy3/inputs/patch_maps/y3a2_gold_2_2_1_sof_nside4096_nest_i_depth.hs

    input_labels:
        - footprint/footprint
        - footprint/fracdet_griz
        - foreground/foreground
        - foreground/badregions
        - zmax/highdens
        - zmax/highlum
        - depth/depth_i

TXIngestDESY3SpeczCat:
    name: TXIngestDESY3SpeczCat


TXCustomMask: 
    name: TXCustomMask
    fracdet_name: footprint/fracdet_griz
    nside: 4096
    #cuts from Rodriguez-Monroy et al https://arxiv.org/abs/2105.13540 
    cuts: 
        - "footprint/footprint == 1"
        - "footprint/fracdet_griz > 0.8"
        - "foreground/foreground == 0"
        - "foreground/badregions <= 1"
        - "zmax/highdens >= 0.65"
        - "zmax/highlum >= 0.95"
        - "depth/depth_i > 22.2"
    degrade: True



PZPrepareEstimatorLens:
    name: PZPrepareEstimatorLens
    classname: DNFInformer 
    hdf5_groupname: photometry
    redshift_col: redshift
    bands: ['mag_g', 'mag_r', 'mag_i', 'mag_z']
    err_bands: ['mag_err_g', 'mag_err_r', 'mag_err_i', 'mag_err_z' ] 
    mag_limits: {'mag_g': 24.3, 'mag_r': 24.0, 'mag_i': 23.3, 'mag_z': 22.6}

PZEstimatorLens:
    name: PZEstimatorLens 
    classname: DNFEstimator
    hdf5_groupname: photometry
    redshift_col: redshift
    bands: ['mag_g', 'mag_r', 'mag_i', 'mag_z']
    err_bands: ['mag_err_g', 'mag_err_r', 'mag_err_i', 'mag_err_z' ] 
    mag_limits: {'mag_g': 24.3, 'mag_r': 24.0, 'mag_i': 23.3, 'mag_z': 22.6}
    selection_mode: 2    #0: ENF, 1: ANF, 2: DNF see https://github.com/LSSTDESC/rail_dnf
    nondetect_val: .inf

PZRailSummarizeLens:
    name: PZRailSummarizeLens
    classname: PZRailPZSummarize
    catalog_group: lens
    tomography_name: lens
    nsamples: 0
    zmin: 0.0
    zmax: 2.0
    nzbins: 150
    point_estimate_key: DNF_ZN
    hdf5_groupname: tomography
    summarizer: PointEstHistMaskedSummarizer
    module: "rail.estimation.algos.point_est_hist"
    chunk_size: 100_000

PZRailSummarizeSource:
    name: PZRailSummarizeSource
    classname: PZRailPZSummarize
    catalog_group: source
    tomography_name: source
    nsamples: 0
    zmin: 0.0
    zmax: 2.0
    nzbins: 150
    point_estimate_key: DNF_ZN
    hdf5_groupname: tomography
    summarizer: PointEstHistMaskedSummarizer
    module: "rail.estimation.algos.point_est_hist"
    chunk_size: 100_000

TXPhotozPlotSource:
    name: TXPhotozPlotSource

TXPhotozPlotLens:
    name: TXPhotozPlotLens

PZRealizationsPlotSource:
    name: PZRealizationsPlotSource


TXCustomLensSelector:
    name: TXCustomLensSelector
    lens_zbin_edges: [0.20, 0.40, 0.55, 0.70, 0.85, 0.95, 1.05]
    zcol: DNF_Z
    selection_type: DESmaglim
    maglim_band: i
    bright_limit: 17.5
    a: 4
    b: 18
    extra_cols: [EXTENDED_CLASS_SOF, FLAGS_GOLD] #extra columns that are used in the sample selection #TO DO: make this automatic
    apply_mask: True


TXLSSWeightsLinBinned:
    name: TXLSSWeightsLinBinned
    supreme_path_root: data/desy3/inputs/patch_survey_property_maps/
    nbin: 10 
    outlier_fraction: 0.05
    pvalue_threshold: 0.05  # max p-value for maps to be included in the corrected (a very simple form of regularization)
    allow_weighted_input: False
    nside_coverage: 32

TXLSSDensityNullTests:
    name: TXLSSDensityNullTests
    supreme_path_root: data/desy3/inputs/patch_survey_property_maps/
    nbin: 10 
    outlier_fraction: 0.05
    pvalue_threshold: 0.05  # max p-value for maps to be included in the corrected (a very simple form of regularization)
    equal_area_bins: True  # if you are using binned 1d correlations, should the bins have equal area (set False for equal spacing)
    simple_cov: True  # if True will use a diagonal shot noise only covariance for the 1d relations
    diag_blocks_only: True  # If True, will compute only the diagonal blocks of the 1D covariance matrix (no correlation between SP maps)
    b0: [1.5, 1.8, 1.8, 1.9, 2.3, 2.3]
    allow_weighted_input: False
    nside_coverage: 32

TXLensCatalogSplitter:
    name: TXLensCatalogSplitter
    redshift_column: DNF_Z

PZPrepareEstimatorSource:
    name: PZPrepareEstimatorSource
    classname: DNFInformer
    hdf5_groupname: photometry
    redshift_col: redshift
    bands: ['mag_r', 'mag_i', 'mag_z']
    err_bands: ['mag_err_r', 'mag_err_i', 'mag_err_z' ] 
    mag_limits: {'mag_g': 24.3, 'mag_r': 24.0, 'mag_i': 23.3, 'mag_z': 22.6}

PZEstimatorSource:
    name: PZEstimatorSource
    classname: DNFEstimator
    hdf5_groupname: shear
    redshift_col: redshift
    bands: ['mag_r', 'mag_i', 'mag_z']
    err_bands: ['mag_err_r', 'mag_err_i', 'mag_err_z' ] 
    mag_limits: {'mag_g': 24.3, 'mag_r': 24.0, 'mag_i': 23.3, 'mag_z': 22.6}
    selection_mode: 2    #0: ENF, 1: ANF, 2: DNF see https://github.com/LSSTDESC/rail_dnf
    nondetect_val: .inf

TXSourceTomography:
    bands: ["r", "i", "z"]
    source_zbin_edges: [0.0, 0.2, 0.4, 0.6, 0.8]
    seed: 6548756
    spec_mag_column_format: "photometry/mag_{band}"


TXSourceSelectorMetacal:
    input_pz: False
    true_z: False
    bands: ["r", "i", "z"]
    T_cut: 0.5
    s2n_cut: 10.0
    max_rows: 10000000000
    delta_gamma: 0.02
    use_diagonal_response : False
    source_zbin_edges: [0.0, 0.2, 0.4, 0.6, 0.8]


TXRandomCat:
    depth_band: i
    density: 10 # gals per sq arcmin
