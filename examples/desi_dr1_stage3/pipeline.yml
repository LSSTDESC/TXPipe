# Where to put outputs
output_dir: data/example/outputs_desi_dr1_stage3

# How to run the pipeline: mini, parsl, or cwl
launcher:
    name: mini
    interval: 1.0

# Where to run the pipeline: cori-interactive, cori-batch, or local
site:
    name: local
    max_threads: 2

# modules and packages to import that have pipeline
# stages defined in them
modules: txpipe

# where to find any modules that are not in this repo,
# and any other code we need.
python_paths:
  - submodules/WLMassMap/python/desc/

# configuration settings
config: examples/desi_dr1_stage3/config.yml

# On NERSC, set this before running:
# export DATA=${LSST}/groups/WL/users/zuntz/data/metacal-testbed

inputs:
    # See README for paths to download these files
    # shear_catalog: /scratch/gpfs/AAMON/desc_analysis/catalogs/txpipe_allfield_shear.h5
    shear_tomography_classifier: none
    shear_catalog: /scratch/gpfs/AAMON/desc_analysis/catalogs/metadetect_desy6.hdf5
    shear_tomography_catalog: /scratch/gpfs/AAMON/desc_analysis/catalogs/tomography_metadetect_desy6.hdf5
    binned_shear_catalog: /scratch/gpfs/AAMON/desc_analysis/catalogs/binned_metadetect_desy6.hdf5
    shear_photoz_stack: /scratch/gpfs/AAMON/desc_analysis/catalogs/shear_photoz_stack_metadetect_desy6.hdf5

    # photometry_catalog: data/example/inputs/photometry_catalog.hdf5
    # photoz_trained_model: data/example/inputs/cosmoDC2_trees_i25.3.npy
    # exposures: data/example/inputs/exposures.hdf5
    # star_catalog: data/example/inputs/star_catalog.hdf5
    random_cats: /scratch/gpfs/AAMON/desc_analysis/catalogs/random_cats.hdf5
    binned_random_catalog: /scratch/gpfs/AAMON/desc_analysis/catalogs/random_cats.hdf5
    binned_random_catalog_sub: /scratch/gpfs/AAMON/desc_analysis/catalogs/random_cats.hdf5

    spectroscopic_catalog: None
    desi_catalog: /scratch/gpfs/AAMON/desc_analysis/catalogs/LRG_SGC_clustering.dat.fits
    # mask should be already a combination of source and lens.
    mask: /scratch/gpfs/AAMON/desc_analysis/catalogs/dp2_23p5_combined_mask_nmin=500_nside=512.hdf5
    # This file comes with the code
    fiducial_cosmology: data/fiducial_cosmology.yml
    # spectroscopic_catalog: data/example/inputs/mock_spectroscopic_catalog.hdf5

# if supported by the launcher, restart the pipeline where it left off
# if interrupted
resume: true
# where to put output logs for individual stages
log_dir: data/example/logs_desi_dr1_stage3
# where to put an overall parsl pipeline log
pipeline_log: data/example/log_desi_dr1_stage3.txt