# -----------------------------------------------------------------------------
# TXTruthLensSelector
# Selects lens galaxy bins using true (simulation) redshifts.
# -----------------------------------------------------------------------------
TXTruthLensSelector:
  # Tomographic bin edges in redshift.
  # Example: 3 bins covering 0.2 < z < 0.8
  lens_zbin_edges: [0.4, 0.6, 0.8, 1.0]

  # Column name in photometry_catalog that holds the true redshift
  redshift_column: redshift_true

  # Magnitude cut applied before bin selection (use -1 to disable)
  selection_type: maglim
  maglim_band: r
  maglim_limit: 23.5
  snr_i_cut: 5.0   # require i-band SNR > 5 (cuts objects with mag_i_err > ~0.217)


# -----------------------------------------------------------------------------
# TXLensMaps
# Builds raw galaxy count maps (n_gal) per lens tomographic bin.
# -----------------------------------------------------------------------------
TXLensMaps:
  chunk_rows: 100000


# -----------------------------------------------------------------------------
# TXSimpleMask
# Builds a binary footprint mask from the n_gal maps.
# A pixel is unmasked if it has at least `min_counts` galaxies.
# -----------------------------------------------------------------------------
TXSimpleMask:
  # Minimum galaxy count per pixel to be considered unmasked
  min_counts: 1


# -----------------------------------------------------------------------------
# TXDensityMaps
# Converts raw n_gal maps to overdensity maps:  δ = (n - <n>) / <n>
# The mean <n> is computed over unmasked pixels.
# No additional config options needed beyond the global pixelization settings.
# -----------------------------------------------------------------------------
TXDensityMaps: {}


# -----------------------------------------------------------------------------
# TXTracerMetadata
# Collates per-bin metadata: effective galaxy density, sigma_e, n(z) info.
# -----------------------------------------------------------------------------
TXTracerMetadata:
  # Whether photoz stacks are provided (True) or should be skipped (False).
  # Set to True if lens_photoz_stack and shear_photoz_stack are provided.
  true_nz: False        # set True to use redshift_true column for n(z)


# -----------------------------------------------------------------------------
# TXLSSDensityNullTests
# Performs large-scale structure density null / systematics tests.
# Checks for correlations between the density maps and potential systematics.
# -----------------------------------------------------------------------------
TXLSSDensityNullTests:
  # ell range for the null-test power spectra
  ell_min: 10
  ell_max: 1000
  n_ell: 15
  ell_spacing: log       # 'log' or 'linear'

  # Significance threshold for null-test failures (in sigma)
  null_test_threshold: 3.0
  supreme_path_root: /global/cfs/cdirs/lsst/groups/PZ/users/qhang/dp2_maps_may/
  # TODO: Fix this
  # Hack to get the stage running despite mask being larger than the sysmaps:
  fill_missing_pix: True


# -----------------------------------------------------------------------------
# TXSystematicsTwoPointFourier
# Cross-correlates galaxy density maps with all systematics maps,
# both with and without mode deprojection, and computes Gaussian covariance.
# -----------------------------------------------------------------------------
TXSystematicsTwoPointFourier:
  systmaps_clustering_dir: /global/cfs/cdirs/lsst/groups/PZ/users/qhang/dp2_maps_may/
  systmaps_healsparse_reduction: mean
  mask_threshold: 0.0
  ell_min: 10
  ell_max: 1500
  n_ell: 20
  ell_spacing: log
  cache_dir: data/cache/systematics_twopoint_fourier


# -----------------------------------------------------------------------------
# TXLensNoiseMaps
# Generates shot-noise realisations for the lens bins.
# Used internally by TXTwoPointFourier for noise bias subtraction.
# -----------------------------------------------------------------------------
TXLensNoiseMaps:
  chunk_rows: 100000
  # Number of noise realisations (more → lower variance in noise estimate)
  clustering_realizations: 30


# -----------------------------------------------------------------------------
# TXTwoPointFourier
# Computes angular power spectra C_ell using NaMaster.
# With a lens-only pipeline, only pos-pos spectra are available.
# -----------------------------------------------------------------------------
TXTwoPointFourier:
  # ell binning
  ell_min: 10
  ell_max: 1500
  n_ell: 20
  ell_spacing: log       # 'log' or 'linear'

  # Mask threshold: pixels with mask value below this are excluded
  mask_threshold: 0.0

  # Shear sign conventions (flip if you see negative shear-shear)
  flip_g1: False
  flip_g2: False

  # Which spectra to compute
  do_pos_pos: True       # galaxy-galaxy (density-density)
  do_shear_pos: False    # galaxy-shear  (requires source bins)
  do_shear_shear: False  # shear-shear   (requires source bins)

  # Use true shear (simulation only, bypasses shape noise)
  true_shear: False

  # Optional: systematics deprojection for number counts
  deproject_syst_clustering: True
  also_compute_no_deproj: True
  systmaps_clustering_dir: /global/cfs/cdirs/lsst/groups/PZ/users/qhang/dp2_maps_may/

  # Optional NaMaster workspace cache (speeds up repeated runs)
  cache_dir: data/cache

  analytic_noise: True

# =============================================================================
# TXFourierNamasterCovariance
# Computes the covariance matrix for the angular power spectra using NaMaster.
# =============================================================================
TXFourierNamasterCovariance:
  use_true_shear: False
  scratch_dir: data/temp

# # =============================================================================
# # TXIngestPlanckLensingMaps
# # Ingests Planck CMB lensing maps (alm and mask) for cross-correlation.
# # =============================================================================
TXIngestPlanckLensingMaps:
    kappa_file: "/global/cfs/cdirs/cmb/data/planck2020/PR4_lensing/PR4_klm_dat_p.fits"
    mask_file: "/global/cfs/cdirs/cmb/data/planck2020/PR4_lensing/mask.fits.gz"
    experiment: "Planck"  # Planck or ACT

## =============================================================================
# TXCMBLensingCrossMonteCarloCorrection
# Computes the Monte Carlo correction for the CMB lensing cross-correlation.
## This accounts for mode-coupling effects due to the mask and noise.
## Requires the Planck lensing maps and the lens density maps to be ingested first.
## The correction is applied to the cross-power spectra computed by TXTwoPointFourierCMBLensingCrossDensity.
## =============================================================================
## ACT DR6
TXCMBLensingCrossMonteCarloCorrection:
    nside: 512
    nsim: 400
    bandpower_width: 30
    mask_threshold: 0.0
    lmax: 0       # 0 means use 3*nside-1 = 1535
    ### ACT DR6
    experiment: "ACT_DR6"
    sim_index_start: 0
    ffp10_offset: 0 # not applicable for ACT DR6 sims
    input_alm_template: /global/cfs/projectdirs/act/www/dr6_lensing_v1/sim_inputs/kappa_alm/input_kappa_alm_sim_{i:04d}.fits
    input_alm_hdu: 1  # the ACT DR6 input kappa alm files have the lensing potential in HDU 1
    # Reconstructed kappa maps from reconstruction pipeline
    recon_alm_template: /global/cfs/projectdirs/act/www/dr6_lensing_v1/maps/baseline/simulations/kappa_alm_sim_act_dr6_lensing_v1_baseline_{i:04d}.fits

# # =============================================================================
# # TXTwoPointFourierCMBLensingCrossDensity
# # Computes cross-power spectra between the lens density maps and Planck CMB lensing.
# # =============================================================================
TXTwoPointFourierCMBLensingCrossDensity:
    bandpower_width: 30
    mask_threshold: 0.0
