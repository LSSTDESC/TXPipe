# =============================================================================
# TXPipe configuration file
# Adjust values to match your data and computing environment.
# =============================================================================

# -----------------------------------------------------------------------------
# Global options – shared across all stages that read them
# -----------------------------------------------------------------------------
global:
  # Number of catalog rows to read/write in a single chunk.
  # Larger values are faster but use more RAM.
  chunk_rows: 100000

  # HEALPix pixelisation (required by TXTwoPointFourier)
  pixelization: healpix
  nside: 512            # ~6.9 arcmin pixels; increase for higher resolution
  sparse: True          # use sparse maps (faster for small sky areas)


# =============================================================================
# Stage-specific configuration
# Each block name must match the stage's `name` attribute exactly.
# =============================================================================

# -----------------------------------------------------------------------------
# TXIngestParquetCatalog  (our custom stage from ingest_parquet.py)
#
# parquet_paths accepts three formats – pick ONE and delete the others:
#
#   (a) Single file
#   (b) Explicit list of files  ← concatenated in the order listed
#   (c) Glob pattern            ← resolved alphabetically
#
# All files must have the same column schema.
# -----------------------------------------------------------------------------
TXIngestParquetCatalog:

  # (b) Explicit list of Cardinal mock tiles (54 tiles) ---------------------
  parquet_paths:
